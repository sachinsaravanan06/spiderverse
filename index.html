<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="SpiderVerse"/>
<meta name="application-name" content="SpiderVerse"/>
<meta name="theme-color" content="#030002"/>
<meta name="description" content="SpiderVerse - Secure Spider-Man Chat"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon.png"/>
<title>SpiderVerse Chat 🕷️</title>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Orbitron:wght@700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#030002;--red:#e63946;--red2:#ff1744;--red3:#b71c1c;--red4:#ff6b6b;
  --text:#f5e0e0;--text2:#bb7777;--text3:#553333;
  --border:rgba(230,57,70,.15);--border2:rgba(230,57,70,.45);
  --font:'Rajdhani',sans-serif;--fontH:'Orbitron',sans-serif;
  --sb:env(safe-area-inset-bottom,0px);--st:env(safe-area-inset-top,0px);
}
html,body{height:100%;height:100dvh;font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden;overscroll-behavior:none}
#app{display:flex;flex-direction:column;height:100dvh;position:relative;overflow:hidden}

/* BG */
#spidey-bg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.web-grid{position:absolute;inset:0;opacity:.07;animation:wpulse 4s ease-in-out infinite}
@keyframes wpulse{0%,100%{opacity:.07}50%{opacity:.13}}
.web-grid svg{width:100%;height:100%}
.sp1{position:absolute;font-size:clamp(36px,7vw,66px);animation:sw1 9s cubic-bezier(.4,0,.6,1) infinite;filter:drop-shadow(0 0 14px var(--red2));z-index:2}
@keyframes sw1{0%{left:8%;top:8%;transform:rotate(-20deg)}20%{left:40%;top:38%;transform:rotate(10deg)}40%{left:72%;top:12%;transform:rotate(-15deg)}60%{left:85%;top:55%;transform:rotate(20deg)}80%{left:45%;top:72%;transform:rotate(-8deg)}100%{left:8%;top:8%;transform:rotate(-20deg)}}
.sp2{position:absolute;font-size:clamp(24px,4vw,44px);animation:sw2 13s cubic-bezier(.4,0,.6,1) infinite 4s;filter:drop-shadow(0 0 9px var(--red));z-index:2;opacity:.65}
@keyframes sw2{0%{left:88%;top:65%;transform:scaleX(-1) rotate(15deg)}25%{left:55%;top:82%;transform:scaleX(-1) rotate(-10deg)}50%{left:10%;top:45%;transform:scaleX(-1) rotate(20deg)}75%{left:30%;top:8%;transform:scaleX(-1) rotate(-12deg)}100%{left:88%;top:65%;transform:scaleX(-1) rotate(15deg)}}
.sp3{position:absolute;font-size:clamp(16px,3vw,30px);animation:sw3 17s linear infinite 7s;z-index:1;opacity:.4}
@keyframes sw3{0%{left:-6%;top:68%;transform:scaleX(1)}50%{left:106%;top:18%;transform:scaleX(1)}50.01%{transform:scaleX(-1)}100%{left:-6%;top:68%;transform:scaleX(-1)}}
.wl{position:absolute;height:2px;background:linear-gradient(90deg,transparent,rgba(200,200,200,.5),rgba(255,255,255,.8),rgba(200,200,200,.5),transparent);border-radius:1px;animation:wla var(--d,9s) ease-in-out infinite var(--dl,0s);opacity:0}
@keyframes wla{0%{opacity:0;width:0;left:8%;top:14%}5%{opacity:.6}40%{opacity:.45;width:var(--w,250px);left:var(--lx,40%);top:var(--ty,38%)}46%{opacity:0}}
.rp{position:absolute;border-radius:50%;background:var(--red2);opacity:0;animation:rpf var(--d,7s) ease-in-out infinite var(--dl,0s)}
@keyframes rpf{0%{transform:translateY(0) scale(1);opacity:0}20%{opacity:.75}100%{transform:translateY(var(--dy,-150px)) translateX(var(--dx,25px)) scale(0);opacity:0}}
.cweb{position:fixed;pointer-events:none;opacity:.18;animation:cp 3s ease-in-out infinite var(--dl,0s);z-index:999}
@keyframes cp{0%,100%{opacity:.18}50%{opacity:.38}}
.scanlines{position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(230,57,70,.01) 3px,rgba(230,57,70,.01) 6px);z-index:1001}
.vignette{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse at center,transparent 35%,rgba(0,0,0,.72) 100%);z-index:998}

/* LAYOUT */
#main{flex:1;display:flex;overflow:hidden;position:relative;z-index:10;min-height:0}
#sidebar{width:285px;min-width:285px;background:rgba(5,0,0,.97);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:relative;transition:transform .25s ease}
#sidebar::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red3),var(--red2),#ff8a80,var(--red2),var(--red3));animation:sfire 2s ease-in-out infinite}
@keyframes sfire{0%,100%{filter:brightness(1)}50%{filter:brightness(2.2)}}
@media(max-width:680px){
  #sidebar{position:fixed;top:0;left:0;bottom:0;z-index:500;width:85vw;min-width:0;max-width:310px;transform:translateX(-100%);box-shadow:4px 0 30px rgba(230,57,70,.3)}
  #sidebar.open{transform:translateX(0)}
  #sov{display:block!important;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:499;opacity:0;pointer-events:none;transition:opacity .25s}
  #sidebar.open~#sov{opacity:1;pointer-events:all}
}
@media(min-width:681px){#sov{display:none!important}#mob-bar{display:none!important}}
#mob-bar{display:flex;align-items:center;gap:10px;padding:10px 14px;padding-top:calc(10px + var(--st));background:rgba(5,0,0,.97);border-bottom:1px solid var(--border);flex-shrink:0;position:relative;z-index:10}
#mob-bar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--red2),transparent);opacity:.4}
.mmb{width:36px;height:36px;background:rgba(230,57,70,.08);border:1px solid var(--border2);border-radius:6px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;flex-shrink:0}
.mrn{font-family:var(--fontH);font-size:11px;color:var(--red2);letter-spacing:2px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mlogo{font-family:var(--fontH);font-size:11px;color:var(--red2);letter-spacing:3px}

/* SIDEBAR CONTENT */
.shdr{padding:14px 14px 10px;border-bottom:1px solid var(--border);padding-top:calc(14px + var(--st))}
.slogo{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.sli{font-size:20px;animation:wspin 4s ease-in-out infinite;filter:drop-shadow(0 0 5px var(--red2))}
@keyframes wspin{0%,100%{transform:rotate(0) scale(1)}50%{transform:rotate(15deg) scale(1.1)}}
.slt{font-family:var(--fontH);font-size:11px;font-weight:900;background:linear-gradient(90deg,var(--red2),#fff,var(--red2));background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px;animation:tsh 4s linear infinite}
@keyframes tsh{0%{background-position:0}100%{background-position:200%}}
.ubdg{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(230,57,70,.05);border:1px solid var(--border);border-radius:3px;margin-bottom:10px;position:relative;overflow:hidden}
.ubdg::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--red2),var(--red3));box-shadow:0 0 7px var(--red)}
.uav{width:36px;height:36px;border-radius:50%;border:2px solid rgba(230,57,70,.5);box-shadow:0 0 8px rgba(230,57,70,.2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px;background:rgba(230,57,70,.08);overflow:hidden}
.uav img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.unfo{min-width:0;flex:1}
.uname{font-size:11px;font-weight:700;font-family:var(--fontH);color:var(--red2);letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ust{font-size:9px;color:#ff8a80;display:flex;align-items:center;gap:3px}
.dot{width:5px;height:5px;border-radius:50%;background:var(--red2);animation:rdot 1.5s infinite;box-shadow:0 0 5px var(--red2)}
@keyframes rdot{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.5);opacity:.5}}
.hdr-btns{display:flex;gap:4px;flex-shrink:0}
.hdr-btn{padding:5px 8px;background:transparent;border:1px solid rgba(230,57,70,.35);border-radius:2px;color:var(--red2);font-size:10px;cursor:pointer;font-family:var(--fontH);letter-spacing:1px;transition:all .2s}
.hdr-btn:hover{background:rgba(230,57,70,.12)}
.srch{position:relative;margin-bottom:2px}
.srch input{width:100%;background:rgba(230,57,70,.04);border:1px solid var(--border);border-radius:2px;padding:8px 10px 8px 30px;font-size:13px;color:var(--text);outline:none;font-family:var(--font)}
.srch input:focus{border-color:var(--red)}.srch input::placeholder{color:var(--text3)}
.si{position:absolute;left:8px;top:50%;transform:translateY(-50%);font-size:13px}
.rlist{flex:1;overflow-y:auto;padding:6px;overscroll-behavior:contain}
.rlist::-webkit-scrollbar{width:2px}.rlist::-webkit-scrollbar-thumb{background:var(--red3)}
.ri{display:flex;align-items:center;gap:9px;padding:9px;border-radius:3px;cursor:pointer;border:1px solid transparent;margin-bottom:2px;transition:all .2s;position:relative;overflow:hidden}
.ri:hover{background:rgba(230,57,70,.06);border-color:var(--border)}
.ri.on{background:rgba(230,57,70,.1);border-color:rgba(230,57,70,.3)}
.ri.on::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--red2),var(--red3));box-shadow:0 0 6px var(--red)}
.rav{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;position:relative;border:1px solid rgba(230,57,70,.2)}
.ondot{position:absolute;bottom:0;right:0;width:9px;height:9px;background:var(--red2);border-radius:50%;border:2px solid var(--bg);box-shadow:0 0 5px var(--red2)}
.rinfo{flex:1;min-width:0}
.rn{font-size:10px;font-weight:700;font-family:var(--fontH);color:var(--text);letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rl{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.rmeta{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.rt{font-size:9px;color:var(--text3);font-family:var(--fontH)}
.ubcnt{background:linear-gradient(135deg,var(--red2),var(--red3));color:#fff;font-size:9px;font-weight:700;border-radius:9px;padding:2px 6px;font-family:var(--fontH)}
.nch{margin:4px 12px 6px;padding:9px;border:1px dashed rgba(230,57,70,.4);border-radius:3px;background:transparent;color:var(--red2);font-size:9px;cursor:pointer;font-family:var(--fontH);letter-spacing:3px;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .2s;width:calc(100% - 24px)}
.nch:hover{background:rgba(230,57,70,.07)}
.nch.admin-btn{border-color:rgba(255,215,0,.4);color:#ffd700}
.online-sec{padding:8px 14px 6px;border-top:1px solid var(--border)}
.online-ttl{font-family:var(--fontH);font-size:9px;color:var(--text3);letter-spacing:3px;margin-bottom:7px;display:flex;align-items:center;gap:5px}
.online-row{display:flex;flex-wrap:wrap;gap:6px;padding-bottom:4px}
.ou{display:flex;flex-direction:column;align-items:center;gap:3px;width:48px}
.ou-av{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;border:2px solid rgba(230,57,70,.45);position:relative;background:rgba(230,57,70,.07);overflow:hidden}
.ou-av img{width:100%;height:100%;object-fit:cover}
.ou-av .lr{position:absolute;inset:-3px;border-radius:50%;border:1px solid var(--red2);animation:rring 2s linear infinite;opacity:.5}
@keyframes rring{to{transform:rotate(360deg)}}
.ou-name{font-size:8px;color:var(--text2);font-family:var(--fontH);letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:48px;text-align:center}

/* CHAT PANEL */
#chat-panel{flex:1;display:flex;flex-direction:column;background:transparent;min-width:0;position:relative;overflow:hidden}
.chat-bg{position:absolute;inset:0;background:linear-gradient(135deg,rgba(3,0,0,.87),rgba(6,0,0,.83),rgba(3,0,0,.9));z-index:0}
#chat-panel>*:not(.chat-bg){position:relative;z-index:1}
.home-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:20px;overflow-y:auto}
.home-sp{font-size:clamp(50px,10vw,80px);animation:spab 2s ease-in-out infinite;filter:drop-shadow(0 0 20px var(--red2))}
@keyframes spab{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-12px) rotate(5deg)}}
.home-title{font-family:var(--fontH);font-size:clamp(14px,3vw,22px);color:var(--red2);letter-spacing:4px;text-shadow:0 0 12px var(--red);text-align:center}
.online-card{width:100%;max-width:460px;background:rgba(230,57,70,.04);border:1px solid var(--border);border-radius:4px;padding:14px}
.online-card-title{font-family:var(--fontH);font-size:10px;color:var(--red2);letter-spacing:3px;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.online-grid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}
.hu{display:flex;flex-direction:column;align-items:center;gap:5px}
.hu-av{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;border:2px solid rgba(230,57,70,.5);box-shadow:0 0 10px rgba(230,57,70,.2);position:relative;background:rgba(230,57,70,.07);animation:av-glow 3s ease-in-out infinite;overflow:hidden}
@keyframes av-glow{0%,100%{box-shadow:0 0 10px rgba(230,57,70,.2)}50%{box-shadow:0 0 18px rgba(230,57,70,.45)}}
.hu-av img{width:100%;height:100%;object-fit:cover}
.hu-av .lr{position:absolute;inset:-4px;border-radius:50%;border:2px solid var(--red2);animation:rring 2s linear infinite;opacity:.45}
.hu-name{font-size:9px;color:var(--text2);font-family:var(--fontH);letter-spacing:.5px}
.chdr{padding:10px 14px;background:rgba(5,0,0,.97);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;flex-shrink:0;position:relative}
.chdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--red2),transparent);opacity:.45}
.chav{font-size:20px;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid rgba(230,57,70,.4);flex-shrink:0;position:relative}
.chav::after{content:'';position:absolute;inset:-3px;border-radius:50%;border:1px solid rgba(230,57,70,.2);animation:rring 3s linear infinite}
.chinfo{flex:1;min-width:0}
.chname{font-size:13px;font-weight:700;font-family:var(--fontH);color:var(--red2);letter-spacing:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chsub{font-size:10px;color:var(--text2);margin-top:2px;display:flex;align-items:center;gap:6px}
.enc{font-size:9px;color:var(--red2);padding:1px 6px;background:rgba(230,57,70,.06);border-radius:2px;border:1px solid rgba(230,57,70,.2);font-family:var(--fontH);letter-spacing:1px}
.msgs-area{flex:1;overflow-y:auto;padding:14px;overscroll-behavior:contain}
.msgs-area::-webkit-scrollbar{width:2px}.msgs-area::-webkit-scrollbar-thumb{background:var(--red3)}
.ddiv{text-align:center;margin:14px 0;font-size:9px;color:var(--text3);font-family:var(--fontH);letter-spacing:3px}
.ddiv span{background:rgba(230,57,70,.05);padding:3px 12px;border-radius:2px;border:1px solid var(--border)}
.enc-notice{text-align:center;margin:6px 0 10px;font-size:9px;color:rgba(230,57,70,.45);font-family:var(--fontH);letter-spacing:2px}
.mrow{display:flex;align-items:flex-end;gap:7px;margin-bottom:5px;animation:mslam .35s cubic-bezier(.34,1.56,.64,1)}
@keyframes mslam{0%{opacity:0;transform:translateY(18px) scale(.88)}60%{transform:translateY(-3px) scale(1.02)}100%{opacity:1;transform:translateY(0) scale(1)}}
.mrow.me{flex-direction:row-reverse}
.mav{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;border:1px solid rgba(230,57,70,.35);background:rgba(230,57,70,.07);overflow:hidden}
.mav img{width:100%;height:100%;object-fit:cover}
.bub{max-width:72%;padding:9px 12px;font-size:13px;line-height:1.6;word-break:break-word}
@media(min-width:481px){.bub{max-width:65%}}
.bub.th{background:rgba(14,2,2,.95);border:1px solid rgba(230,57,70,.15);border-radius:2px 10px 10px 10px}
.bub.me{background:linear-gradient(135deg,rgba(183,28,28,.25),rgba(230,57,70,.2));border:1px solid rgba(230,57,70,.4);border-radius:10px 2px 10px 10px}
.bsend{font-size:9px;font-weight:700;color:var(--red2);margin-bottom:3px;font-family:var(--fontH);letter-spacing:1px}
.btime{font-size:9px;text-align:right;margin-top:4px;display:flex;align-items:center;justify-content:flex-end;gap:3px;color:var(--text3);font-family:var(--fontH)}
.bub.me .btime{color:rgba(230,57,70,.55)}
.tick{color:var(--red2);font-size:10px}
.syswrap{text-align:center;margin:6px 0}
.sysmsg{font-size:9px;color:var(--text3);padding:2px 12px;background:rgba(230,57,70,.04);border-radius:2px;border:1px solid var(--border);display:inline-block;font-family:var(--fontH);letter-spacing:2px}
/* DM section in sidebar */
.dm-section{padding:6px 14px 4px;border-top:1px solid var(--border)}
.dm-ttl{font-family:var(--fontH);font-size:9px;color:var(--text3);letter-spacing:3px;margin-bottom:6px;display:flex;align-items:center;gap:5px}
/* Delete msg button */
.mrow{position:relative}
/* del-btn removed - using right-click context menu instead */
.bub.deleted{opacity:.4;font-style:italic;font-size:11px}
@keyframes toast-in{0%{opacity:0;transform:translateX(-50%) translateY(10px)}100%{opacity:1;transform:translateX(-50%) translateY(0)}}
/* Delete context menu */
.del-menu{
  position:fixed;z-index:9999;
  background:linear-gradient(160deg,rgba(10,0,0,.99),rgba(20,2,2,.99));
  border:1px solid var(--border2);border-radius:8px;
  overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,.7);
  min-width:180px;animation:del-menu-in .15s ease-out;
}
@keyframes del-menu-in{0%{opacity:0;transform:scale(.9)}100%{opacity:1;transform:scale(1)}}
.del-menu-item{
  display:flex;align-items:center;gap:10px;
  padding:12px 16px;cursor:pointer;
  font-family:var(--fontH);font-size:10px;letter-spacing:1px;
  transition:background .15s;color:var(--text);
}
.del-menu-item:hover{background:rgba(230,57,70,.12)}
.del-menu-item.danger{color:var(--red2)}
.del-menu-item.danger:hover{background:rgba(230,57,70,.2)}
.del-menu-divider{height:1px;background:var(--border);margin:0}
/* DM badge */
.dm-badge{background:linear-gradient(135deg,#7c3aed,#00d4ff);color:#fff;font-size:8px;font-weight:700;border-radius:9px;padding:1px 5px;font-family:var(--fontH);margin-left:4px}
.irow{padding:10px 12px;padding-bottom:calc(10px + var(--sb));background:rgba(4,0,0,.98);border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0;position:relative}
.irow::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--red2),transparent);opacity:.35}
.ebtn{width:32px;height:32px;background:transparent;border:none;font-size:17px;cursor:pointer;border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.minp{flex:1;background:rgba(230,57,70,.04);border:1px solid var(--border);border-radius:20px;padding:9px 15px;font-size:14px;color:var(--text);outline:none;resize:none;font-family:var(--font);max-height:90px;overflow-y:auto;line-height:1.4;transition:border .2s}
.minp:focus{border-color:var(--red)}.minp::placeholder{color:var(--text3)}
.sbtn{width:42px;height:42px;flex-shrink:0;background:linear-gradient(135deg,rgba(183,28,28,.5),rgba(230,57,70,.5));border:1px solid var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:19px;transition:all .25s;box-shadow:0 0 10px rgba(230,57,70,.18)}
.sbtn:hover{transform:scale(1.1)}.sbtn:active{transform:scale(.92)}.sbtn:disabled{opacity:.3;cursor:default;transform:none}

/* AUTH */
.auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;z-index:10;padding:16px;padding-top:calc(16px + var(--st));overflow-y:auto}

.wtrl{position:fixed;pointer-events:none;z-index:9997;height:2px;background:linear-gradient(90deg,transparent,rgba(200,200,200,.65),rgba(255,255,255,.85));transform-origin:left center;border-radius:1px;animation:wtrla var(--dur,.78s) ease-out forwards}

/* ══ SUPABASE ══ */
async function dbGet(t,p=''){
  const r=await fetch(`${SUPA_URL}/rest/v1/${t}${p}`,{headers:{'apikey':SUPA_KEY,'Authorization':'Bearer '+SUPA_KEY}});
  if(!r.ok)throw new Error(await r.text());return r.json();
}
async function dbPost(t,b){

  if(!r.ok)throw new Error(await r.text());return r.json();
}
async function dbPatch(t,p,b){

}

/* ══ E2E ENCRYPTION ══ */
const SECRET='SpiderVerse_E2E_2024_KEY';
async function deriveKey(room){
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey('raw',enc.encode(SECRET),{name:'PBKDF2'},false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:enc.encode('sv_'+room),iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);
}
async function encryptMsg(text,room){
  try{const key=await deriveKey(room);const iv=crypto.getRandomValues(new Uint8Array(12));const enc=new TextEncoder();const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},key,enc.encode(text));const out=new Uint8Array(iv.byteLength+ct.byteLength);out.set(iv,0);out.set(new Uint8Array(ct),iv.byteLength);return btoa(String.fromCharCode(...out));}catch(e){return text;}
}
async function decryptMsg(b64,room){
  try{const key=await deriveKey(room);const buf=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:buf.slice(0,12)},key,buf.slice(12));return new TextDecoder().decode(pt);}catch(e){return b64;}
}

}

/* ══ HELPERS ══ */
function hash(s){let h=0;for(let c of s)h=(h*31+c.charCodeAt(0))>>>0;return h.toString(16);}
function ft(ts){return new Date(ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}
function fd(ts){const d=new Date(ts),n=new Date();if(d.toDateString()===n.toDateString())return'TODAY';const y=new Date(n);y.setDate(y.getDate()-1);if(d.toDateString()===y.toDateString())return'YESTERDAY';return d.toLocaleDateString([],{month:'short',day:'numeric'}).toUpperCase();}
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function isMob(){return window.innerWidth<=680;}
function openSB(){document.getElementById('sidebar').classList.add('open');}
function closeSB(){document.getElementById('sidebar').classList.remove('open');}

/* ══ POLLING ══ */
function startPolling(){
  stopPolling();
  S.pollTimer=setInterval(async()=>{if(S.activeRoom&&S.user)await pollMsgs(S.activeRoom);},3000);
  S.onlineTimer=setInterval(async()=>{await pingOnline();await fetchOnline();},15000);
  pingOnline();fetchOnline();
}
function stopPolling(){
  if(S.pollTimer){clearInterval(S.pollTimer);S.pollTimer=null;}
  if(S.onlineTimer){clearInterval(S.onlineTimer);S.onlineTimer=null;}
}
async function pingOnline(){
  if(!S.user)return;
  try{await dbPatch('users',`?username=eq.${encodeURIComponent(S.user.id)}`,{last_seen:new Date().toISOString()});}catch(e){}
}
async function fetchOnline(){
  try{
    const since=new Date(Date.now()-120000).toISOString();
    const rows=await dbGet('users',`?last_seen=gte.${encodeURIComponent(since)}&status=eq.approved&select=username,avatar,last_seen,display_name&order=last_seen.desc`);
    S.onlineUsers=(rows||[]).filter(u=>!S.blockedUsers.includes(u.username));
    updateOnlineUI();
  }catch(e){}
}
function updateOnlineUI(){
  const el=document.getElementById('online-row');if(el)el.innerHTML=renderOnlineSmall();
  const hel=document.getElementById('home-online-users');if(hel)hel.innerHTML=renderOnlineBig();
}
function renderOnlineSmall(){
  return S.onlineUsers.filter(u=>u.username!==S.user?.id).map(u=>`
<div class="ou" style="cursor:pointer" onclick="openDM('${esc(u.username)}','${esc(u.avatar||'🕷️')}','${esc(u.display_name||u.username)}')" title="DM ${esc(u.username)}">
  <div class="ou-av">${avInner(u.avatar)}<div class="lr"></div></div>
  <div class="ou-name">${esc(u.display_name||u.username)}</div>
</div>`).join('');
}
function renderOnlineBig(){
  if(!S.onlineUsers.length)return`<div style="font-size:11px;color:var(--text3);font-family:var(--fontH);letter-spacing:2px;padding:10px 0;text-align:center">NO AGENTS ONLINE YET</div>`;
  return S.onlineUsers.map(u=>`<div class="hu"><div class="hu-av">${avInner(u.avatar)}<div class="lr"></div></div><div class="hu-name">${esc((u.display_name||u.username).toUpperCase())}</div></div>`).join('');
}
async function pollMsgs(room){
  try{
    const lastId=S.lastMsgId[room]||0;
    const rows=await dbGet('messages',`?room=eq.${encodeURIComponent(room)}&id=gt.${lastId}&order=created_at.asc&limit=50`);
    if(!rows||!rows.length)return;
    let added=false;
    for(const row of rows){
      if(!S.messages[room])S.messages[room]=[];
      if(S.messages[room].find(m=>m.id===row.id))continue;
      // skip blocked users
      if(S.blockedUsers.includes(row.username))continue;
      row._plain=row.username==='__system'?row.text:await decryptMsg(row.text,room);
      S.messages[room].push(row);
      S.lastMsgId[room]=Math.max(S.lastMsgId[room]||0,row.id);
      added=true;
    }
    if(added){renderMsgsOnly();setTimeout(scrollBottom,40);rebuildRooms();refreshDMList();}
  }catch(e){}
}

/* ══ ROCKET ══ */
function fireRocket(){
  const btn=document.getElementById('send-btn');const ma=document.getElementById('msgs-area');
  if(!btn||!ma)return;
  const br=btn.getBoundingClientRect(),mr=ma.getBoundingClientRect();
  const sx=br.left+br.width/2,sy=br.top+br.height/2,ex=mr.right-50,ey=mr.top+40;
  const dx=ex-sx,dy=ey-sy,ang=Math.atan2(dy,dx)*(180/Math.PI)+90,dur=.76;
  const sp=document.createElement('div');sp.className='spt';sp.textContent='🕷️';sp.style.left=sx+'px';sp.style.top=sy+'px';document.body.appendChild(sp);setTimeout(()=>sp.remove(),820);
  const rk=document.createElement('div');rk.className='rocket';
  rk.style.setProperty('--sx',sx+'px');rk.style.setProperty('--sy',sy+'px');rk.style.setProperty('--ex',ex+'px');rk.style.setProperty('--ey',ey+'px');rk.style.setProperty('--ang',ang+'deg');rk.style.setProperty('--dur',dur+'s');
  rk.innerHTML=`<svg viewBox="0 0 36 36" width="36" height="36" xmlns="http://www.w3.org/2000/svg"><polygon points="18,2 32,32 18,25 4,32" fill="#fff" stroke="#e63946" stroke-width="1.5"/><line x1="18" y1="2" x2="18" y2="25" stroke="#e63946" stroke-width="1" opacity=".6"/><text x="18" y="20" text-anchor="middle" font-size="9">🕷️</text><ellipse cx="18" cy="33" rx="3" ry="4.5" fill="url(#fg)"/><defs><radialGradient id="fg" cx="50%" cy="30%"><stop offset="0%" stop-color="#fff"/><stop offset="45%" stop-color="#ff1744"/><stop offset="100%" stop-color="transparent"/></radialGradient></defs></svg>`;
  document.body.appendChild(rk);setTimeout(()=>rk.remove(),(dur*1000)+100);
  const tl=document.createElement('div');tl.className='wtrl';const tlen=Math.sqrt(dx*dx+dy*dy);
  tl.style.cssText=`left:${sx}px;top:${sy}px;transform-origin:left center;transform:rotate(${Math.atan2(dy,dx)*(180/Math.PI)}deg);--tw:${tlen}px;--dur:${dur}s`;
  document.body.appendChild(tl);setTimeout(()=>tl.remove(),(dur*1000)+200);
  setTimeout(()=>{
    const rng=document.createElement('div');rng.className='lring';rng.style.left=ex+'px';rng.style.top=ey+'px';document.body.appendChild(rng);setTimeout(()=>rng.remove(),480);
    for(let i=0;i<8;i++){const s2=document.createElement('div');s2.className='sprk';const a=(i/8)*Math.PI*2,r=22+Math.random()*16;s2.style.left=ex+'px';s2.style.top=ey+'px';s2.style.setProperty('--sx2',Math.cos(a)*r+'px');s2.style.setProperty('--sy2',Math.sin(a)*r+'px');s2.style.background=i%2?'#fff':'#ff1744';s2.style.animationDelay=(i*22)+'ms';document.body.appendChild(s2);setTimeout(()=>s2.remove(),480);}
  },dur*1000);
}

function bindAuth(){
  document.querySelectorAll('.atab').forEach(t=>{t.onclick=()=>{S.authTab=t.dataset.tab;S.authErr='';S.authOk='';render();};});
  document.querySelectorAll('.av-opt').forEach(o=>{o.onclick=()=>{S.authSelAv=o.dataset.av;document.querySelectorAll('.av-opt').forEach(x=>x.classList.toggle('sel',x.dataset.av===S.authSelAv));};});
  const au=document.getElementById('au'),ap=document.getElementById('ap');
  async function go(){
    const id=(au?.value||'').trim().toLowerCase().replace(/\s/g,'');
    const pw=ap?.value||'';
    if(!id||!pw){S.authErr='Fill in all fields';render();return;}
    if(id.length<3){S.authErr='ID must be 3+ chars';render();return;}
    if(pw.length<4){S.authErr='Code must be 4+ chars';render();return;}
    S.authLoading=true;S.authErr='';S.authOk='';render();
    try{
      if(S.authTab==='login'){
        const rows=await dbGet('users',`?username=eq.${encodeURIComponent(id)}&select=*`);
        if(!rows||!rows.length){S.authErr='Agent not found. Please register first.';S.authLoading=false;render();return;}
        const u=rows[0];
        if(u.pass_hash!==hash(pw)){S.authErr='Wrong web code!';S.authLoading=false;render();return;}
        if(u.blocked){S.authErr='Your account has been blocked by admin.';S.authLoading=false;render();return;}
        // Admin always gets in. Approved = status='approved' OR approved=true (handles old accounts)
        const isApproved=(u.status==='approved'||u.approved===true);
        if(id!==ADMIN&&!isApproved){
          S.user={id,username:id,avatar:u.avatar||'🕷️',full_name:u.full_name||id,display_name:u.display_name||u.full_name||id};
          S.authLoading=false;
          if(u.status==='rejected'){S.authErr='Your request was rejected by admin.';S.user=null;render();return;}
          S.screen='pending';render();return;
        }
        S.user={id,username:id,avatar:u.avatar||(id===ADMIN?'__spidey__':'🕷️'),full_name:u.full_name||id,display_name:u.display_name||u.full_name||id};
        await dbPatch('users',`?username=eq.${encodeURIComponent(id)}`,{last_seen:new Date().toISOString()});
        saveSession();S.screen='app';S.authLoading=false;render();
      } else {
        const fn=(document.getElementById('afn')?.value||'').trim();
        const reason=(document.getElementById('areason')?.value||'').trim();
        if(!fn){S.authErr='Please enter your full name';S.authLoading=false;render();return;}
        if(!reason){S.authErr='Please tell us why you want to join';S.authLoading=false;render();return;}
        const exists=await dbGet('users',`?username=eq.${encodeURIComponent(id)}&select=id`);
        if(exists&&exists.length>0){S.authErr='Agent ID already taken!';S.authLoading=false;render();return;}
        const av=S.authSelAv||'🕷️';
        await dbPost('users',{username:id,pass_hash:hash(pw),avatar:av,full_name:fn,display_name:fn,reason,status:'pending',approved:false,blocked:false,last_seen:new Date().toISOString()});
        try{await emailjs.send(EJS_SVC,EJS_TPL,{from_name:fn,username:id,reason});}catch(e){}
        S.authLoading=false;
        S.authOk=`Request sent! Admin will review and approve you. Login once approved.`;
        S.authTab='login';render();
      }
    }catch(e){S.authErr='Connection error. Check internet & try again.';S.authLoading=false;render();}
  }
  document.getElementById('auth-btn').onclick=go;
  if(ap)ap.addEventListener('keydown',e=>{if(e.key==='Enter')go();});
  if(au)setTimeout(()=>au.focus(),80);
}

/* ══ PENDING ══ */
async function checkApproval(){
  if(!S.user)return;
  try{
    const rows=await dbGet('users',`?username=eq.${encodeURIComponent(S.user.id)}&select=status,blocked`);
    if(!rows||!rows[0]){return;}
    const u=rows[0];
    if(u.blocked){clearSession();S.user=null;S.screen='auth';S.authErr='Your account has been blocked.';render();return;}
    if(u.status==='approved'||u.approved===true){saveSession();S.screen='app';render();}
    else if(u.status==='rejected'){clearSession();S.user=null;S.screen='auth';S.authErr='Your request was rejected by admin.';render();}
    else{const btn=document.querySelector('.pbtn');if(btn){const orig=btn.textContent;btn.textContent='⏳ Still pending...';setTimeout(()=>btn.textContent=orig,2000);}}
  }catch(e){alert('Error checking. Try again.');}
}

/* ══ LOAD MESSAGES ══ */
async function loadMsgs(room){
  try{
    const rows=await dbGet('messages',`?room=eq.${encodeURIComponent(room)}&order=created_at.asc&limit=100`);
    S.messages[room]=await Promise.all((rows||[]).filter(r=>!S.blockedUsers.includes(r.username)).map(async row=>{
      row._plain=row.username==='__system'?row.text:await decryptMsg(row.text,room);
      if(row.id)S.lastMsgId[room]=Math.max(S.lastMsgId[room]||0,row.id);
      return row;
    }));
  }catch(e){S.messages[room]=[];}
  renderMsgsOnly();setTimeout(scrollBottom,60);
}

/* ══ CHAT PANEL ══ */
function buildMsgsHTML(){
  const msgs=S.messages[S.activeRoom]||[];
  let html='<div class="enc-notice">🔒 End-to-end encrypted</div>';
  let lastDay='';
  msgs.forEach((m,i)=>{
    const ts=m.created_at||Date.now();const day=fd(ts);
    if(day!==lastDay){html+=`<div class="ddiv"><span>${esc(day)}</span></div>`;lastDay=day;}
    if(m.username==='__system'){html+=`<div class="syswrap"><span class="sysmsg">🕷️ ${esc(m._plain||m.text)}</span></div>`;return;}
    const mine=m.username===S.user.id;const prev=msgs[i-1];
    const showAv=!mine&&(!prev||prev.username!==m.username||prev.username==='__system');
    // get sender avatar
    const senderData=S.onlineUsers.find(u=>u.username===m.username);
    const senderAv=mine?S.user.avatar:(senderData?.avatar||'🕷️');
    const isDeleted=(m._plain&&m._plain.startsWith('🗑️'))||m.text==='__deleted__';
    const canDelete=mine&&!isDeleted&&m.id&&!String(m.id).startsWith('tmp');
    html+=`<div class="mrow${mine?' me':''}" ${canDelete?`oncontextmenu="showDelMenu(event,${m.id},'${S.activeRoom}')" ontouchstart="startLongPress(event,${m.id},'${S.activeRoom}')" ontouchend="cancelLongPress()" ontouchcancel="cancelLongPress()"`:''} style="user-select:none">
${!mine?`<div class="mav" style="${showAv?'':'visibility:hidden;'};cursor:pointer" onclick="openDM('${esc(m.username)}','${esc(senderAv)}','${esc(senderData?.display_name||m.username)}')" title="Send DM to ${esc(m.username)}">${avInner(senderAv)}</div>`:''}
<div class="bub ${mine?'me':'th'}${isDeleted?' deleted':''}">
${showAv&&!mine?`<div class="bsend" style="cursor:pointer" onclick="openDM('${esc(m.username)}','${esc(senderAv)}','${esc(senderData?.display_name||m.username)}')">${esc((senderData?.display_name||m.username).toUpperCase())} 💬</div>`:''}
${isDeleted?'🗑️ <i>Message deleted</i>':esc(m._plain||m.text)}
<div class="btime">${ft(ts)}${mine?'<span class="tick">✓✓</span>':''}</div>
</div>
</div>`;
  });
  return html;
}

function setupInput(){
  const mi=document.getElementById('msg-inp'),sb=document.getElementById('send-btn');
  if(!mi)return;
  mi.addEventListener('input',function(){if(sb)sb.disabled=!this.value.trim();this.style.height='auto';this.style.height=Math.min(this.scrollHeight,90)+'px';});
  mi.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey&&!isMob()){e.preventDefault();doSend();}});
  if(sb)sb.addEventListener('click',doSend);
  if(!isMob())setTimeout(()=>mi.focus(),100);
}
async function doSend(){
  const mi=document.getElementById('msg-inp');const text=mi?mi.value.trim():'';
  if(!S.activeRoom||!text)return;
  fireRocket();
  const encrypted=await encryptMsg(text,S.activeRoom);
  const local={id:'tmp-'+uid(),room:S.activeRoom,username:S.user.id,text:encrypted,_plain:text,created_at:new Date().toISOString()};
  if(!S.messages[S.activeRoom])S.messages[S.activeRoom]=[];
  S.messages[S.activeRoom].push(local);
  if(mi){mi.value='';mi.style.height='auto';}
  const sb=document.getElementById('send-btn');if(sb)sb.disabled=true;
  renderMsgsOnly();scrollBottom();
  if(mi&&!isMob())mi.focus();
  try{
    const saved=await dbPost('messages',{room:S.activeRoom,username:S.user.id,text:encrypted});
    if(saved&&saved[0]){
      const idx=S.messages[S.activeRoom].findIndex(m=>m.id===local.id);
      if(idx!==-1){S.messages[S.activeRoom][idx]={...S.messages[S.activeRoom][idx],id:saved[0].id};}
      S.lastMsgId[S.activeRoom]=Math.max(S.lastMsgId[S.activeRoom]||0,saved[0].id);
    }
  }catch(e){}
  rebuildRooms();
}
function scrollBottom(){const el=document.getElementById('msgs-area');if(el)el.scrollTop=el.scrollHeight;}

/* ══ DM FUNCTIONS ══ */
function getDMRoomId(userA,userB){
  // Consistent room ID regardless of who initiates
  return 'dm_'+[userA,userB].sort().join('_');
}
function renderDMList(){
  const dms=Object.values(S.dmRooms);
  if(!dms.length)return`<div style="font-size:10px;color:var(--text3);padding:4px 0;font-family:var(--fontH);letter-spacing:1px">TAP A USER TO DM THEM</div>`;
  return dms.map(dm=>{
    const msgs=S.messages[dm.id]||[];
    const last=msgs[msgs.length-1];
    const cnt=S.unread[dm.id]||0;
    const active=S.activeRoom===dm.id;
    const lastTxt=last?(last.username===S.user.id?'YOU: '+(last._plain||last.text):(last._plain||last.text)):'Say hi!';
    return`<div class="ri${active?' on':''}" data-room="${dm.id}" style="padding:7px 9px">
<div class="rav" style="background:rgba(124,58,237,.15);font-size:16px;width:34px;height:34px">${avInner(dm.avatar||'🕷️')}<div class="ondot"></div></div>
<div class="rinfo"><div class="rn" style="font-size:9px">${esc(dm.name)} <span class="dm-badge">DM</span></div><div class="rl">${esc(lastTxt)}</div></div>
<div class="rmeta">${cnt>0?`<div class="ubcnt">${cnt}</div>`:''}</div>
</div>`;
  }).join('');
}
function openDM(username,avatar,displayName){
  if(username===S.user.id)return;
  const roomId=getDMRoomId(S.user.id,username);
  if(!S.dmRooms[roomId]){
    S.dmRooms[roomId]={id:roomId,name:displayName||username,avatar:avatar||'🕷️',isDM:true,dmWith:username};
  }
  S.activeRoom=roomId;
  S.unread[roomId]=0;
  if(!S.messages[roomId])S.messages[roomId]=[];
  loadMsgs(roomId);
  renderSidebar();
  renderChatPanel();
  updateMobBar();
  if(isMob())closeSB();
}
function refreshDMList(){
  const el=document.getElementById('dm-list');
  if(el)el.innerHTML=renderDMList();
  // rebind room clicks for DM items
  document.querySelectorAll('#dm-list .ri[data-room]').forEach(el=>{
    el.addEventListener('click',async()=>{
      const rid=el.dataset.room;S.activeRoom=rid;S.unread[rid]=0;
      if(!S.messages[rid]||!S.messages[rid].length){S.messages[rid]=[];await loadMsgs(rid);}
      renderChatPanel();updateMobBar();
      if(isMob())closeSB();setTimeout(scrollBottom,80);
    });
  });
}

let _lpTimer=null;
function startLongPress(e,msgId,room){
  _lpTimer=setTimeout(()=>{showDelMenu(e,msgId,room);},500);

function cancelLongPress(){if(_lpTimer){clearTimeout(_lpTimer);_lpTimer=null;}}

function showDelMenu(e,msgId,room){
  e.preventDefault();
  e.stopPropagation();
  // remove existing
  document.querySelectorAll('.del-menu').forEach(m=>m.remove());
  const menu=document.createElement('div');
  menu.className='del-menu';
  menu.innerHTML=`
<div class="del-menu-item" id="dmenu-me">
  <span style="font-size:16px">👁️</span>
  <div><div style="font-size:10px;font-weight:700">DELETE FOR ME</div><div style="font-size:9px;color:var(--text3);margin-top:2px">Only you won't see it</div></div>
</div>
<div class="del-menu-divider"></div>
<div class="del-menu-item danger" id="dmenu-all">
  <span style="font-size:16px">🗑️</span>
  <div><div style="font-size:10px;font-weight:700">DELETE FOR EVERYONE</div><div style="font-size:9px;color:var(--text3);margin-top:2px">Removes for all users</div></div>
</div>
<div class="del-menu-divider"></div>
<div class="del-menu-item" id="dmenu-cancel">
  <span style="font-size:16px">✕</span>
  <div style="font-size:10px;font-weight:700">CANCEL</div>
</div>`;
  // position near click/touch
  const x=e.touches?e.touches[0].clientX:e.clientX;
  const y=e.touches?e.touches[0].clientY:e.clientY;
  const menuW=200,menuH=150;
  const left=Math.min(x,window.innerWidth-menuW-10);
  const top=Math.min(y,window.innerHeight-menuH-10);
  menu.style.left=left+'px';
  menu.style.top=top+'px';
  document.body.appendChild(menu);

  // bind actions
  document.getElementById('dmenu-me').onclick=()=>{menu.remove();deleteForMe(msgId,room);};
  document.getElementById('dmenu-all').onclick=()=>{menu.remove();deleteForEveryone(msgId,room);};
  document.getElementById('dmenu-cancel').onclick=()=>menu.remove();

  // close on outside click
  setTimeout(()=>{
    document.addEventListener('click',function handler(){menu.remove();document.removeEventListener('click',handler);},{once:true});
  },10);
}

function deleteForMe(msgId,room){
  // Only remove from local state — other users still see it
  if(S.messages[room]){
    S.messages[room]=S.messages[room].filter(m=>m.id!==msgId);
  }
  renderMsgsOnly();
  // Show quick toast
  showToast('👁️ Deleted for you only');
}

async function deleteForEveryone(msgId,room){
  // Update in DB so everyone sees it deleted
  if(S.messages[room]){
    const idx=S.messages[room].findIndex(m=>m.id===msgId);
    if(idx!==-1){
      S.messages[room][idx]._plain='🗑️ Message deleted';
      S.messages[room][idx].deleted=true;
      S.messages[room][idx].text='__deleted__';
    }
  }
  renderMsgsOnly();
  showToast('🗑️ Deleted for everyone');
  try{
    await dbPatch('messages',`?id=eq.${msgId}`,{text:'__deleted__'});
  }catch(e){
    console.log('DB delete error:',e);
  }
}

function showToast(msg){
  const t=document.createElement('div');
  t.style.cssText=`position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(10,0,0,.95);border:1px solid var(--border2);color:var(--text);font-family:var(--fontH);font-size:10px;letter-spacing:1px;padding:8px 18px;border-radius:20px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.5);animation:toast-in .2s ease-out;white-space:nowrap`;
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},2000);
}

async function approveUser(username){
  const btn=document.querySelector(`#req-${username} .approve-btn`);
  if(btn){btn.textContent='APPROVING...';btn.disabled=true;}
  try{
    // Set BOTH status and approved fields to handle all cases
    const result=await dbPatch('users',`?username=eq.${encodeURIComponent(username)}`,{status:'approved',approved:true});
    console.log('Approve result:',result);
    await dbPost('messages',{room:'general',username:'__system',text:`✅ AGENT ${username.toUpperCase()} HAS BEEN APPROVED AND JOINED THE WEB!`});
    const card=document.getElementById('req-'+username);
    if(card)card.innerHTML=`<div style="font-family:var(--fontH);font-size:10px;color:#4caf50;padding:8px;letter-spacing:2px;text-align:center;border:1px solid rgba(76,175,80,.3);border-radius:3px">✅ ${username.toUpperCase()} APPROVED! They can now login.</div>`;
  }catch(e){
    console.error('Approve error:',e);
    alert('Error approving: '+e.message+'. Check Supabase RLS policies.');
    if(btn){btn.textContent='✅ APPROVE';btn.disabled=false;}
  }
}

async function rejectUser(username){
  if(!confirm(`Reject ${username}? They cannot login.`))return;
  try{
    await dbPatch('users',`?username=eq.${encodeURIComponent(username)}`,{status:'rejected',approved:false});
    const card=document.getElementById('req-'+username);
    if(card)card.innerHTML=`<div style="font-family:var(--fontH);font-size:10px;color:var(--red2);padding:8px;letter-spacing:2px;text-align:center">❌ ${username.toUpperCase()} REJECTED</div>`;
  }catch(e){alert('Error rejecting. Try again.');}
}

async function toggleBlock(username,currentlyBlocked){
  const newBlocked=!currentlyBlocked;
  try{
    await dbPatch('users',`?username=eq.${encodeURIComponent(username)}`,{blocked:newBlocked});
    const card=document.getElementById('ucard-'+username);
    if(card){
      card.querySelector('.user-card-status').textContent=newBlocked?'🚫 BLOCKED':'✅ ACTIVE';
      const btn=card.querySelector('.block-btn');
      btn.className=`block-btn ${newBlocked?'blocked':'unblocked'}`;
      btn.textContent=newBlocked?'UNBLOCK':'BLOCK';
      btn.onclick=()=>toggleBlock(username,newBlocked);
    }
    // If blocked, add to local blocked list
    if(newBlocked&&!S.blockedUsers.includes(username))S.blockedUsers.push(username);
    else if(!newBlocked)S.blockedUsers=S.blockedUsers.filter(u=>u!==username);
  }catch(e){alert('Error. Try again.');}
}

(function setupPWA(){
  // Register service worker inline
  if('serviceWorker' in navigator){
    const swCode=`
const CACHE='spiderverse-v1';
const ASSETS=['/'];
self.addEventListener('install',e=>{
  e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS)));
  self.skipWaiting();
});
self.addEventListener('activate',e=>{
  e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
  self.clients.claim();
});
self.addEventListener('fetch',e=>{
  e.respondWith(fetch(e.request).catch(()=>caches.match(e.request)));
});`;
    const swBlob=new Blob([swCode],{type:'application/javascript'});
    const swURL=URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swURL,{scope:'./'}).then(()=>{
      console.log('✅ SpiderVerse SW registered');
    }).catch(e=>console.log('SW error:',e));
  }

  // Show install prompt
  let deferredPrompt=null;
  window.addEventListener('beforeinstallprompt',e=>{
    e.preventDefault();
    deferredPrompt=e;
    // Show install banner after 3 seconds
    setTimeout(()=>{
      if(deferredPrompt)showInstallBanner(deferredPrompt);
    },3000);
  });

  function showInstallBanner(prompt){
    const banner=document.createElement('div');
    banner.id='install-banner';
    banner.style.cssText=`
      position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
      background:linear-gradient(135deg,rgba(10,0,0,.98),rgba(20,2,2,.98));
      border:1px solid rgba(230,57,70,.5);border-radius:12px;
      padding:14px 18px;z-index:9999;
      display:flex;align-items:center;gap:12px;
      box-shadow:0 8px 30px rgba(0,0,0,.7),0 0 20px rgba(230,57,70,.2);
      font-family:'Orbitron',sans-serif;
      animation:toast-in .3s ease-out;
      max-width:320px;width:calc(100% - 40px);
    `;
    banner.innerHTML=`
      <div style="font-size:32px;filter:drop-shadow(0 0 8px #ff1744)">🕷️</div>
      <div style="flex:1">
        <div style="font-size:10px;font-weight:700;color:#ff1744;letter-spacing:2px">INSTALL APP</div>
        <div style="font-size:10px;color:#bb7777;margin-top:3px;letter-spacing:1px">Add SpiderVerse to home screen</div>
      </div>
      <button id="install-yes" style="padding:8px 14px;background:linear-gradient(135deg,rgba(183,28,28,.6),rgba(230,57,70,.6));border:1px solid #e63946;border-radius:6px;color:#fff;font-size:9px;cursor:pointer;font-family:'Orbitron',sans-serif;letter-spacing:1px;white-space:nowrap">INSTALL</button>
      <button id="install-no" style="padding:8px;background:transparent;border:none;color:#553333;font-size:16px;cursor:pointer">✕</button>
    `;
    document.body.appendChild(banner);
    document.getElementById('install-yes').onclick=async()=>{
      banner.remove();
      await prompt.prompt();
      deferredPrompt=null;
    };
    document.getElementById('install-no').onclick=()=>banner.remove();
  }

  // iOS install hint
  const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  const isInStandalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
  if(isIOS&&!isInStandalone){
    setTimeout(()=>{
      const banner=document.createElement('div');
      banner.style.cssText=`
        position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
        background:linear-gradient(135deg,rgba(10,0,0,.98),rgba(20,2,2,.98));
        border:1px solid rgba(230,57,70,.5);border-radius:12px;
        padding:14px 18px;z-index:9999;
        box-shadow:0 8px 30px rgba(0,0,0,.7);
        font-family:'Orbitron',sans-serif;
        max-width:320px;width:calc(100% - 40px);
        text-align:center;
      `;
      banner.innerHTML=`
        <div style="font-size:28px;margin-bottom:8px">🕷️</div>
        <div style="font-size:10px;font-weight:700;color:#ff1744;letter-spacing:2px;margin-bottom:6px">INSTALL ON IPHONE</div>
        <div style="font-size:10px;color:#bb7777;letter-spacing:1px;line-height:1.6">Tap the <strong style="color:#fff">Share button ⬆️</strong> at the bottom<br>then tap <strong style="color:#fff">"Add to Home Screen"</strong></div>
        <button onclick="this.parentElement.remove()" style="margin-top:12px;padding:7px 20px;background:transparent;border:1px solid rgba(230,57,70,.4);border-radius:6px;color:#e63946;font-size:9px;cursor:pointer;font-family:'Orbitron',sans-serif;letter-spacing:1px">GOT IT</button>
      `;
      document.body.appendChild(banner);
      setTimeout(()=>banner?.remove(),15000);
    },3000);
  }
})();
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&S.activeRoom&&S.user){pollMsgs(S.activeRoom);fetchOnline();}});

/* ══ BOOT ══ */
loadSession();
if(S.user&&S.screen==='app'){
  dbGet('users',`?username=eq.${encodeURIComponent(S.user.id)}&select=status,avatar,full_name,display_name,blocked`)
  .then(rows=>{
    if(!rows||!rows[0]){render();return;}
    const u=rows[0];
    if(u.blocked){clearSession();S.user=null;S.screen='auth';S.authErr='Your account has been blocked.';render();return;}
    const bootApproved=(u.status==='approved'||u.approved===true);
    if(S.user.id!==ADMIN&&!bootApproved){S.screen='pending';render();return;}
    S.user.avatar=u.avatar||(S.user.id===ADMIN?'__spidey__':S.user.avatar||'🕷️');
    S.user.full_name=u.full_name||S.user.full_name||S.user.id;
    S.user.display_name=u.display_name||u.full_name||S.user.id;
    saveSession();render();
  }).catch(()=>render());
} else {render();}
</script>
</body>
</html>
